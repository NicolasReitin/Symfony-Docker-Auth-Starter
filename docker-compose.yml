services:
  php:
    build: docker/php
    volumes:
      - ./:/var/www/html
      - /var/www/html/var # Volume anonyme pour booster les perfs de cache/logs Symfony sous WSL
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy # Attendre que MySQL soit prêt avant de lancer PHP
    environment:
      MAILER_DSN: smtp://mailpit:1025

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro # Montage en lecture seule (ro) pour la sécurité de Nginx
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - php

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # Interface web uniquement (le port SMTP 1025 reste interne au réseau Docker)

volumes:
  db_data:
